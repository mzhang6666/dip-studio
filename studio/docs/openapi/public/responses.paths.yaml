openapi: 3.1.0

info:
  title: DIP Studio 对话响应接口
  version: 0.1.0

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

security:
  - BearerAuth: []

servers:
  - url: /api/dip-studio/v1

paths:
  /digital-human/{id}/chat/responses:
    post:
      operationId: createDigitalHumanResponse
      summary: 创建数字员工响应流
      parameters:
        - name: id
          in: path
          required: true
          description: 数字员工 ID
          schema:
            type: string
        - name: x-openclaw-session-key
          in: header
          required: false
          description: 透传到 OpenClaw `/v1/responses` 的会话键
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './responses.schemas.yaml#/components/schemas/DigitalHumanResponseRequest'
      responses:
        "200":
          description: 数字员工响应事件流
          headers:
            x-openclaw-session-key:
              description: 实际使用的会话键；当请求未显式传入时由服务端自动生成并返回
              schema:
                type: string
          content:
            text/event-stream:
              schema:
                $ref: './responses.schemas.yaml#/components/schemas/DigitalHumanResponseStream'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "409":
          $ref: '../common.schemas.yaml#/errors/Conflict'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
