openapi: 3.1.0

info:
  title: DIP Studio 技能接口
  version: 0.1.0

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer

security:
  - BearerAuth: []

servers:
  - url: /api/dip-studio/v1

paths:
  /skills:
    get:
      operationId: getEnabledSkills
      summary: 获取全局启用技能列表
      responses:
        "200":
          description: 全局启用技能列表
          content:
            application/json:
              schema:
                $ref: './skills.schemas.yaml#/components/schemas/DigitalHumanSkillList'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'

  /digital-human/{id}/skills:
    get:
      operationId: getDigitalHumanSkills
      summary: 获取指定数字员工已配置技能列表
      parameters:
        - name: id
          in: path
          required: true
          description: 数字员工 ID（与 OpenClaw agent id 一致）
          schema:
            type: string
      responses:
        "200":
          description: 已配置技能列表
          content:
            application/json:
              schema:
                $ref: './skills.schemas.yaml#/components/schemas/DigitalHumanAgentSkillList'
        "400":
          $ref: '../common.schemas.yaml#/errors/InvalidParameter'
        "401":
          $ref: '../common.schemas.yaml#/errors/Unauthorized'
        "403":
          $ref: '../common.schemas.yaml#/errors/Forbidden'
        "404":
          $ref: '../common.schemas.yaml#/errors/NotFound'
        "502":
          $ref: '../common.schemas.yaml#/errors/BadGateway'
        "500":
          $ref: '../common.schemas.yaml#/errors/InternalServerError'
